name: Web CI

on:
  push:
    branches: [ main ]
    paths:
      - 'web/**'
      - '.github/workflows/web_ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'web/**'

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './web/package-lock.json'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run ESLint
        run: npm run lint
        
      - name: Build Next.js
        run: npm run build
