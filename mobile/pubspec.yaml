name: fleetman_mobile
description: "FleetMan Mobile Application (Algerian Fleet Management SaaS)"
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  supabase_flutter: ^2.3.0
  go_router: ^12.1.1
  flutter_riverpod: ^2.4.9
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  mobile_scanner: ^7.2.0
  image_picker: ^1.2.1
  record: ^6.2.0
  sqflite: ^2.4.2
  connectivity_plus: ^6.0.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  freezed: ^2.4.5
  json_serializable: ^6.7.1

flutter:
  generate: true
  uses-material-design: true
